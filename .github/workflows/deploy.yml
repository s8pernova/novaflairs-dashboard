name: Deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Deploy to VM over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 2m
          command_timeout: 45m
          script_stop: true
          script: |
            set -euo pipefail

            REPO_DIR=/opt/orbit-fire-dashboard
            DATA_DIR=/opt/node-red-data
            CONTAINER_NAME=nodered
            IMAGE_NAME=nodered/node-red:latest

            cd "$REPO_DIR"
            git fetch --all --prune
            git reset --hard origin/main

            mkdir -p "$DATA_DIR"

            rsync -a --delete \
              --exclude '.git/' \
              "$REPO_DIR/nodered/" "$DATA_DIR/"

            npm ci --omit=dev --prefix "$DATA_DIR"

            docker pull "$IMAGE_NAME"
            docker rm -f "$CONTAINER_NAME" || true

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 1880:1880 \
              -v "$DATA_DIR:/data" \
              "$IMAGE_NAME"

            docker ps --filter "name=$CONTAINER_NAME"
            docker logs --tail=120 "$CONTAINER_NAME" || true
