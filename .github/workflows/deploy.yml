name: Deploy Node-RED

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "nodered/**"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy-nodered-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Deploy Node-RED to VM over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          timeout: 2m
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail

            REPO_DIR=/opt/orbit-fire-dashboard
            DATA_DIR=/opt/node-red-data
            CONTAINER_NAME=nodered
            IMAGE_NAME=nodered/node-red:latest

            cd "$REPO_DIR"
            git fetch --all
            git reset --hard origin/main

            sudo mkdir -p "$DATA_DIR"
            sudo cp -a "$REPO_DIR/nodered/." "$DATA_DIR/"

            sudo npm ci --omit=dev --prefix "$DATA_DIR"
            sudo chown -R 1000:1000 "$DATA_DIR"

            sudo docker pull "$IMAGE_NAME"
            sudo docker rm -f "$CONTAINER_NAME" || true

            sudo docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 1880:1880 \
              -v "$DATA_DIR:/data" \
              "$IMAGE_NAME"

            sudo docker ps --filter "name=$CONTAINER_NAME"
            sudo docker logs --tail=120 "$CONTAINER_NAME" || true
